version: '3.9'

services:
  neo4j:
    image: neo4j:5.14-community
    container_name: save-my-tokens-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_server_memory_heap_initial__size: 1g
      NEO4J_server_memory_heap_max__size: 2g
      NEO4J_dbms_memory_pagecache_size: 1g
    volumes:
      - neo4j_data:/var/lib/neo4j/data
      - neo4j_logs:/var/lib/neo4j/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - save-my-tokens

  # Optional: pgAdmin for Neo4j Browser (UI for visualizing graph)
  neo4j-browser:
    image: neo4j:5.14-community
    container_name: save-my-tokens-browser
    ports:
      - "7475:7474"
    environment:
      NEO4J_AUTH: "off"
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - save-my-tokens

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  save-my-tokens:
    driver: bridge
