name: Sync Graph with Code Changes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sync-graph:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5.14-community
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        options: >-
          --health-cmd "curl -f http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 7687:7687

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Full history for git analysis

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Neo4j
        run: |
          until curl -f http://localhost:7687 || nc -z localhost 7687; do
            echo "Waiting for Neo4j..."
            sleep 2
          done

      - name: Check graph status
        run: |
          python build_graph.py --check
        continue-on-error: true

      - name: Build/rebuild graph from source
        run: |
          echo "Building graph from source code..."
          python build_graph.py --clear

      - name: Verify graph integrity
        run: |
          python -c "
          from src.graph.neo4j_client import Neo4jClient
          client = Neo4jClient()
          stats = client.get_stats()
          print(f'Graph stats: {stats}')
          assert stats['node_count'] > 0, 'Graph is empty!'
          client.close()
          print('Graph verification: PASSED')
          "

      - name: Report graph size
        run: |
          python -c "
          from src.graph.neo4j_client import Neo4jClient
          client = Neo4jClient()
          stats = client.get_stats()
          print(f'✓ Nodes: {stats[\"node_count\"]}')
          print(f'✓ Edges: {stats[\"edge_count\"]}')
          client.close()
          "

      - name: Summary
        if: success()
        run: |
          echo "Graph synced successfully with code changes"
          echo "Next agent session will have fresh graph state"
