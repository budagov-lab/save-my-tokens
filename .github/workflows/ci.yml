name: CI - Setup & Build Graph

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      neo4j:
        image: neo4j:5.14
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 7687:7687
          - 7474:7474

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python packages
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Create .env for CI
        run: |
          cat > .env << EOF
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=testpassword
          EMBEDDING_MODEL=all-MiniLM-L6-v2
          LOG_LEVEL=INFO
          EOF

      - name: Wait for Neo4j to be ready
        run: |
          for i in {1..30}; do
            echo "Waiting for Neo4j... attempt $i/30"
            python -c "
          from neo4j import GraphDatabase
          try:
              driver = GraphDatabase.driver('bolt://localhost:7687', auth=('neo4j', 'testpassword'), connection_timeout=5)
              with driver.session() as session:
                  session.run('RETURN 1')
              print('Neo4j is ready')
              driver.close()
              exit(0)
          except Exception as e:
              print(f'Not ready yet: {e}')
              exit(1)
            " && break
            sleep 2
          done

      - name: Run prelaunch checks
        run: |
          python prelaunch_check.py

      - name: Build graph
        run: |
          smt build

      - name: Check graph status
        run: |
          smt status

      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
